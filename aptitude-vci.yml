base_url: "http://localhost:3000"

credential_issuance:

  authorization_code_issuance:

    - id: "VCI-005"
      name: "PID Issuance (mDoc, X.509, Authorization Code)"
      description: "OID4VCI 1.0 authorization-code issuance for urn:eu.europa.ec.eudi:pid:1:mso_mdoc in mso_mdoc format using the x509 signature profile and x509_san_dns client_id scheme, delivered through the eu-eaa-offer:// offer scheme. The flow requires PAR, PKCE with S256, Wallet Instance Attestation with proof of possession at the PAR and Token endpoints, and sender-constrained access tokens. The credential request requires proofs and accepts attestation while rejecting jwt for the mdoc path. The issuer signing material is the X.509 certificate chain at ./x509EC/client_certificate.crt. This test covers VCI-CHECK-01, VCI-CHECK-02, VCI-CHECK-03, VCI-CHECK-03A, VCI-CHECK-05, VCI-CHECK-06, VCI-CHECK-06A, VCI-CHECK-07, and VCI-CHECK-08, with expected outcome successful end-to-end authorization-code issuance for the mdoc X.509 case, or explicit rejection of the wrong proof type."
      method: "GET"
      path: "/vci/offer"
      url: "http://localhost:3000/vci/offer?flow=authorization_code&credential_type=urn%3Aeu.europa.ec.eudi%3Apid%3A1%3Amso_mdoc&credential_format=mso_mdoc&signature_type=x509&offer_scheme=eu_eaa"
      parameters:
        flow: "authorization_code"
        credential_type: "urn:eu.europa.ec.eudi:pid:1:mso_mdoc"
        credential_format: "mso_mdoc"
        signature_type: "x509"
        offer_scheme: "eu_eaa"
      issuance_protocol: "OID4VCI 1.0"
      request_profile_variant: "Authorization-code flow, mdoc, X.509"
      credential_type: "urn:eu.europa.ec.eudi:pid:1:mso_mdoc"
      credential_format: "mso_mdoc"
      signature_profile: "x509"
      client_id_scheme: "x509_san_dns"
      offer_delivery_scheme: "eu-eaa-offer://"
      flow_type: "authorization_code"
      grant_type: "authorization_code"
      par_required: true
      pkce_required: true
      pkce_method: "S256"
      wallet_instance_attestation:
        required: true
        endpoints:
          - "par"
          - "token"
        pop_required: true
      sender_constrained_access_token: true
      credential_request:
        proofs_required: true
        accepted_proof_types:
          - "attestation"
        rejected_proof_types:
          - "jwt"
      issuer_signing_material:
        certificate_chain_path: "./x509EC/client_certificate.crt"
      checks_covered:
        - "VCI-CHECK-01"
        - "VCI-CHECK-02"
        - "VCI-CHECK-03"
        - "VCI-CHECK-03A"
        - "VCI-CHECK-05"
        - "VCI-CHECK-06"
        - "VCI-CHECK-06A"
        - "VCI-CHECK-07"
        - "VCI-CHECK-08"
      expected_outcome: "Successful end-to-end authorization-code issuance for the mdoc X.509 case, or explicit rejection of the wrong proof type."

