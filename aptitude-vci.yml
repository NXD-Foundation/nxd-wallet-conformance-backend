  pre_authorized_code_issuance:

    - id: "VCI-006"
      name: "PID Issuance (SD-JWT, X.509, Pre-Authorized Code, no tx-code)"
      description: "OID4VCI 1.0 pre-authorized-code issuance for ETSIRfc001PidVcSdJwt in sd-jwt format using the x509 signature profile and x509_san_dns client_id scheme, delivered through the eu-eaa-offer:// offer scheme. The flow uses grant_type urn:ietf:params:oauth:grant-type:pre-authorized_code, does not require PAR or interactive authorization, does not advertise a tx-code step, and uses sender-constrained access tokens. The credential request requires proofs and uses the jwt proof path with Wallet Unit Attestation handling. The issuer signing material is the X.509 certificate chain at ./x509EC/client_certificate.crt. This test covers VCI-CHECK-01, VCI-CHECK-04, VCI-CHECK-05, VCI-CHECK-06, VCI-CHECK-06A, and VCI-CHECK-07, with expected outcome successful pre-authorized issuance for the SD-JWT X.509 case."
      method: "GET"
      path: "/vci/offer"
      url: "http://localhost:3000/vci/offer?flow=pre_authorized_code&tx_code_required=false&credential_type=ETSIRfc001PidVcSdJwt&credential_format=sd-jwt&signature_type=x509&offer_scheme=eu_eaa"
      parameters:
        flow: "pre_authorized_code"
        tx_code_required: "false"
        credential_type: "ETSIRfc001PidVcSdJwt"
        credential_format: "sd-jwt"
        signature_type: "x509"
        offer_scheme: "eu_eaa"

