        scheme: "openid4vp"
        tx_data: "true"
      presentation_protocol: "OpenID4VP 1.0"
      request_profile_variant: "PID / SD-JWT ETSI-aligned with transaction data"
      track: "tx"
      client_id_scheme: "x509_hash"
      response_mode: "direct_post.jwt"
      request_uri_method: "post"
      scheme: "openid4vp"
      wallet_invocation_scheme: "openid4vp://"
      credential_profile: "pid"
