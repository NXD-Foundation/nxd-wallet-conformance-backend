# APTITUDE RFC-02 — Verifiable Presentation deployed test matrix (§11.2)
# Source of truth: RFC002 §11.2 "Deployed Test Case Matrix" (ETSI-aligned SD-JWT track uses
# `x509_hash` only per §5 / §8.2.2; `x509_san_dns`, `did:web`, and `did:jwk` are out of scope
# for this profile — see docs/rfc002-vp-test-case-initiation.md §9.)
#
# Initiation: GET /vp/request. PID rows use profile=dcql (or profile=tx where noted) so the JAR
# is built with dcql_query; see comments in docs/rfc002-vp-test-case-initiation.md.
#
base_url: "http://localhost:3000"

presentation_verification:
  rfc002_section_11_2_deployed_matrix:

    - id: "VP-001"
      name: "PID / SD-JWT — baseline ETSI DCQL (family_name), x509_hash, encrypted response"
      description: "RFC002 §11.2 VP-001: DCQL Verifiable Presentation for urn:eu.europa.ec.eudi:pid:1 with family_name, x509_hash client_id, signed Request Object, mandatory verifier information, encrypted response. Second/third selective-claim variants (VP-002 / VP-003) use distinct JAR / track query parameters on this verifier (see below)."
      method: "GET"
      path: "/vp/request"
      url: "http://localhost:3000/vp/request?session_id=apt-vp-001&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp"
      parameters:
        session_id: "apt-vp-001"
        track: "dcql"
        profile: "dcql"
        credential_profile: "pid"
        client_id_scheme: "x509_hash"
        request_uri_method: "post"
        response_mode: "direct_post.jwt"
        scheme: "openid4vp"
      presentation_protocol: "OpenID4VP 1.0"
      request_profile_variant: "PID / SD-JWT ETSI-aligned selective-claim request (baseline)"
      track: "dcql"
      client_id_scheme: "x509_hash"
      response_mode: "direct_post.jwt"
      request_uri_method: "post"
      scheme: "openid4vp"
      wallet_invocation_scheme: "openid4vp://"
      credential_profile: "pid"
      checks_covered:
        - "VP-CHECK-01"
        - "VP-CHECK-02"
        - "VP-CHECK-03"
        - "VP-CHECK-04"
        - "VP-CHECK-05"
        - "VP-CHECK-06"
        - "VP-CHECK-07"
        - "VP-CHECK-08"
        - "VP-CHECK-09"
      expected_outcome: "Successful completion of the ETSI-aligned PID / family_name presentation session."

    - id: "VP-002"
      name: "PID / SD-JWT — second ETSI-aligned request variant (JAR alg RS256)"
      description: "RFC002 §11.2 VP-002: second deployed PID / SD-JWT ETSI-aligned selective-claim variant. This deployment distinguishes VP-002 from VP-001 by signing the Request Object with RS256 (jar_alg=RS256) instead of the default ES256."
      method: "GET"
      path: "/vp/request"
      url: "http://localhost:3000/vp/request?session_id=apt-vp-002&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp&jar_alg=RS256"
      parameters:
        session_id: "apt-vp-002"
        track: "dcql"
        profile: "dcql"
        credential_profile: "pid"
        client_id_scheme: "x509_hash"
        request_uri_method: "post"
        response_mode: "direct_post.jwt"
        scheme: "openid4vp"
        jar_alg: "RS256"
      presentation_protocol: "OpenID4VP 1.0"
      request_profile_variant: "Second PID / SD-JWT ETSI-aligned selective-claim variant (RS256 JAR)"
      track: "dcql"
      client_id_scheme: "x509_hash"
      response_mode: "direct_post.jwt"
      request_uri_method: "post"
      scheme: "openid4vp"
      wallet_invocation_scheme: "openid4vp://"
      credential_profile: "pid"
      checks_covered:
        - "VP-CHECK-01"
        - "VP-CHECK-02"
        - "VP-CHECK-03"
        - "VP-CHECK-04"
        - "VP-CHECK-05"
        - "VP-CHECK-06"
        - "VP-CHECK-07"
        - "VP-CHECK-08"
        - "VP-CHECK-09"
      expected_outcome: "Successful completion of the ETSI-aligned PID / family_name presentation session (second variant)."

    - id: "VP-003"
      name: "PID / SD-JWT — third ETSI-aligned request variant (tx track, no transaction_data payload)"
      description: "RFC002 §11.2 VP-003: third deployed PID / SD-JWT ETSI-aligned selective-claim variant. This deployment uses profile=tx with tx_data=false so the session uses the transaction-oriented DCQL path without embedding transaction_data in the request (distinct from VP-004)."
      method: "GET"
      path: "/vp/request"
      url: "http://localhost:3000/vp/request?session_id=apt-vp-003&profile=tx&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp&tx_data=false"
      parameters:
        session_id: "apt-vp-003"
        track: "tx"
        profile: "tx"
        credential_profile: "pid"
        client_id_scheme: "x509_hash"
        request_uri_method: "post"
        response_mode: "direct_post.jwt"
        scheme: "openid4vp"
        tx_data: "false"
      presentation_protocol: "OpenID4VP 1.0"
      request_profile_variant: "Third PID / SD-JWT ETSI-aligned selective-claim variant (tx track, no tx payload)"
      track: "tx"
      client_id_scheme: "x509_hash"
      response_mode: "direct_post.jwt"
      request_uri_method: "post"
      scheme: "openid4vp"
      wallet_invocation_scheme: "openid4vp://"
      credential_profile: "pid"
      checks_covered:
        - "VP-CHECK-01"
        - "VP-CHECK-02"
        - "VP-CHECK-03"
        - "VP-CHECK-04"
        - "VP-CHECK-05"
        - "VP-CHECK-06"
        - "VP-CHECK-07"
        - "VP-CHECK-08"
        - "VP-CHECK-09"
      expected_outcome: "Successful completion of the ETSI-aligned PID / family_name presentation session (third variant)."

