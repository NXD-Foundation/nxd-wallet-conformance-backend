      expected_outcome: "Successful completion of the ETSI-aligned transaction-data PID presentation session."

    - id: "VP-005"
      name: "PID / SD-JWT — ETSI DCQL (full PID / structured verifier context)"
      description: "RFC002 §11.2 VP-005: DCQL VP for urn:eu.europa.ec.eudi:pid:1 with x509_hash, signed Request Object, structured verifier information, encrypted response. On this codebase the default DCQL matches the family_name selective disclosure in VP-001; VP-005 uses the same initiation URL as VP-001 so deployments may treat it as the canonical ETSI PID row when only one DCQL shape is published."
      method: "GET"
      path: "/vp/request"
      url: "http://localhost:3000/vp/request?session_id=apt-vp-005&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp"
      parameters:
        session_id: "apt-vp-005"
        track: "dcql"
        profile: "dcql"
        credential_profile: "pid"
        client_id_scheme: "x509_hash"
        request_uri_method: "post"
        response_mode: "direct_post.jwt"
        scheme: "openid4vp"
      presentation_protocol: "OpenID4VP 1.0"
      request_profile_variant: "PID / SD-JWT ETSI-aligned request and response (RFC VP-005)"
      track: "dcql"
      client_id_scheme: "x509_hash"
      response_mode: "direct_post.jwt"
      request_uri_method: "post"
      scheme: "openid4vp"
      wallet_invocation_scheme: "openid4vp://"
      credential_profile: "pid"
      checks_covered:
        - "VP-CHECK-01"
        - "VP-CHECK-02"
        - "VP-CHECK-03"
        - "VP-CHECK-04"
        - "VP-CHECK-05"
        - "VP-CHECK-06"
        - "VP-CHECK-07"
        - "VP-CHECK-08"
        - "VP-CHECK-09"
      expected_outcome: "Successful completion of the ETSI-aligned PID presentation session."

    - id: "VP-006"
      name: "PID / SD-JWT — request_uri retrieval variant (GET) + optional VP-006A eu-eaap"
      description: "RFC002 §11.2 VP-006: ETSI PID request with request_uri-based retrieval (VP-CHECK-12). This row uses request_uri_method=get. RFC002 also defines VP-006A (eu-eaap:// same-device); that second URL is listed under rfc002_vp_006a_same_device_eu_eaap so tooling can still trace VP-CHECK-17."
      method: "GET"
      path: "/vp/request"
      url: "http://localhost:3000/vp/request?session_id=apt-vp-006&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=get&response_mode=direct_post.jwt&scheme=openid4vp"
      parameters:
        session_id: "apt-vp-006"
        track: "dcql"
        profile: "dcql"
        credential_profile: "pid"
        client_id_scheme: "x509_hash"
        request_uri_method: "get"
