          - "VP-CHECK-03"
          - "VP-CHECK-04"
          - "VP-CHECK-09"
          - "VP-CHECK-17"
        expected_outcome: "Successful completion of the ETSI-aligned PID presentation session using eu-eaap:// invocation."
      checks_covered:
