base_url: "http://localhost:3000"
wallet_base_url: "http://localhost:4000"

wallet_issuance_verification:
  rfc001_section_10_1_deployed_matrix:
    - id: "VCI-CHECK-01"
      name: "Offer acquisition"
      invocation: "node wallet-client/src/index.js --issuer http://localhost:3000 --fetch-offer /vci/offer?flow=pre-authorized_code&credential_type=ETSIRfc001PidVcSdJwt&credential_format=sd-jwt&signature_type=x509&offer_scheme=eu_eaa"
      expected_outcome: "Wallet resolves the eu-eaa-offer credential offer and selects the requested credential_configuration_id."
    - id: "VCI-CHECK-02"
      name: "Authorization-code issuance"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3DETSIRfc001PidVcSdJwt%26credential_format%3Dsd-jwt%26signature_type%3Dx509%26offer_scheme%3Deu_eaa\"}'"
      expected_outcome: "Server wallet completes PAR, authorization redirect handling, token exchange, and credential issuance."
    - id: "VCI-CHECK-03"
      name: "PAR handling"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3Durn%253Aeu.europa.ec.eudi%253Apid%253A1%253Amso_mdoc%26credential_format%3Dmso_mdoc%26signature_type%3Dx509%26offer_scheme%3Deu_eaa\",\"proofMode\":\"attestation\"}'"
      expected_outcome: "Wallet uses pushed authorization requests when advertised by the authorization server."
    - id: "VCI-CHECK-04"
      name: "Pre-authorized code issuance"
      invocation: "node wallet-client/src/index.js --issuer http://localhost:3000 --fetch-offer /vci/offer?flow=pre-authorized_code&credential_type=ETSIRfc001PidVcSdJwt&credential_format=sd-jwt&signature_type=x509&offer_scheme=eu_eaa"
      expected_outcome: "Thin CLI harness completes the pre-authorized token and credential exchange using the shared issuance library."
    - id: "VCI-CHECK-05"
      name: "Sender-constrained token and proof"
      invocation: "npm test -- wallet-client/test/transactionDataKb.test.js wallet-client/test/mdlSessionTranscript.test.js"
      expected_outcome: "DPoP-bound token handling and credential/presentation proof binding remain green."
    - id: "VCI-CHECK-06"
      name: "Wallet instance attestation"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3DETSIRfc001PidVcSdJwt%26credential_format%3Dsd-jwt%26signature_type%3Dx509%26offer_scheme%3Deu_eaa\"}'"
      expected_outcome: "Wallet attaches OAuth client attestation headers at PAR and token endpoints when available."
    - id: "VCI-CHECK-06A"
      name: "Wallet unit attestation proof mode"
      invocation: "node wallet-client/src/index.js --issuer http://localhost:3000 --fetch-offer /vci/offer?flow=pre-authorized_code&credential_type=urn:eu.europa.ec.eudi:pid:1:mso_mdoc&credential_format=mso_mdoc&signature_type=x509&offer_scheme=eu_eaa --proof-mode attestation"
      expected_outcome: "mdoc issuance uses proofs.attestation instead of proofs.jwt."
    - id: "VCI-CHECK-07"
      name: "Credential request proof JWT"
      invocation: "node wallet-client/src/index.js --issuer http://localhost:3000 --fetch-offer /vci/offer?flow=pre-authorized_code&credential_type=ETSIRfc001PidVcSdJwt&credential_format=sd-jwt&signature_type=x509&offer_scheme=eu_eaa --proof-mode jwt"
      expected_outcome: "Credential request proof is generated with the negotiated algorithm and current c_nonce."
    - id: "VCI-CHECK-08"
      name: "mDoc proof-type acceptance"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3Durn%253Aeu.europa.ec.eudi%253Apid%253A1%253Amso_mdoc%26credential_format%3Dmso_mdoc%26signature_type%3Dx509%26offer_scheme%3Deu_eaa\",\"proofMode\":\"attestation\"}'"
      expected_outcome: "mdoc issuance succeeds for attestation proof mode and rejects jwt proof mode where the issuer disallows it."
    - id: "VCI-CHECK-09"
      name: "tx_code handling"
      invocation: "node wallet-client/src/index.js --issuer http://localhost:3000 --fetch-offer /vci/offer?flow=pre-authorized_code_tx&credential_type=ETSIRfc001PidVcSdJwt&credential_format=sd-jwt&signature_type=x509&offer_scheme=eu_eaa"
      expected_outcome: "CLI/server supply the advertised tx_code before token exchange."
    - id: "VCI-CHECK-10"
      name: "Credential response encryption A128GCM"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3DETSIRfc001PidVcSdJwt%26credential_format%3Dsd-jwt%26signature_type%3Dx509%26offer_scheme%3Deu_eaa%26credential_response_enc%3DA128GCM\"}'"
      expected_outcome: "Wallet decrypts the encrypted credential response and stores the credential."
    - id: "VCI-CHECK-11"
      name: "Credential response encryption A256GCM"
      invocation: "curl -sS -X POST http://localhost:4000/api/wallet/issue -H 'content-type: application/json' -d '{\"offer\":\"eu-eaa-offer://?credential_offer_uri=http%3A%2F%2Flocalhost%3A3000%2Fvci%2Foffer%3Fflow%3Dauthorization_code%26credential_type%3DETSIRfc001PidVcSdJwt%26credential_format%3Dsd-jwt%26signature_type%3Dx509%26offer_scheme%3Deu_eaa%26credential_response_enc%3DA256GCM\"}'"
      expected_outcome: "Wallet decrypts the encrypted credential response and stores the credential."
