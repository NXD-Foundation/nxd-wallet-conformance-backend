base_url: "http://localhost:3000"
wallet_base_url: "http://localhost:4000"

wallet_presentation_verification:
  rfc002_section_11_1_1_deployed_matrix:
    - id: "VP-CHECK-01"
      name: "Baseline PID DCQL presentation"
      invocation: "curl -sS 'http://localhost:3000/vp/request?session_id=wallet-vp-001&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp' | jq -r '.wallet_invocation_url' | xargs -I{} curl -sS -X POST http://localhost:4000/api/wallet/present -H 'content-type: application/json' -d '{\"deepLink\":\"{}\"}'"
      expected_outcome: "Wallet resolves the request_uri, validates verifier metadata, and returns a direct_post.jwt presentation."
    - id: "VP-CHECK-02"
      name: "Request object retrieval"
      invocation: "npm test -- wallet-client/test/requestUriPost.test.js"
      expected_outcome: "Wallet accepts POST-based request_uri retrieval and parses signed authorization requests."
    - id: "VP-CHECK-03"
      name: "Verifier metadata validation"
      invocation: "npm test -- wallet-client/test/verifierMetadata.test.js"
      expected_outcome: "Wallet enforces the RFC002 verifier metadata requirements including x509_hash."
    - id: "VP-CHECK-04"
      name: "Client identifier scheme x509_hash"
      invocation: "curl -sS 'http://localhost:3000/vp/request?session_id=wallet-vp-004&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=openid4vp'"
      expected_outcome: "Verifier request is generated with x509_hash and accepted by the wallet."
    - id: "VP-CHECK-05"
      name: "direct_post.jwt response mode"
      invocation: "npm test -- tests/paymentTransactionDataHash.test.js"
      expected_outcome: "Verifier-side transaction_data hash validation remains aligned with the wallet direct_post.jwt submission."
    - id: "VP-CHECK-06"
      name: "Response binding"
      invocation: "npm test -- tests/walletClientMdocPresentation.test.js wallet-client/test/mdlSessionTranscript.test.js"
      expected_outcome: "Wallet presentations are rebound to the current SessionTranscript, response_uri, and nonce."
    - id: "VP-CHECK-07"
      name: "Selective disclosure"
      invocation: "npm test -- tests/walletClientMdocPresentation.test.js"
      expected_outcome: "Wallet discloses only the requested mdoc elements and the test asserts the actual subset."
    - id: "VP-CHECK-08"
      name: "Transaction data hash binding"
      invocation: "npm test -- wallet-client/test/transactionDataKb.test.js tests/paymentTransactionDataHash.test.js"
      expected_outcome: "Wallet KB-JWT and verifier validation both honor transaction_data_hashes_alg and the current transaction payload."
    - id: "VP-CHECK-09"
      name: "eu-eaap wallet invocation"
      invocation: "curl -sS 'http://localhost:3000/vp/request?session_id=wallet-vp-009&profile=dcql&credential_profile=pid&client_id_scheme=x509_hash&request_uri_method=post&response_mode=direct_post.jwt&scheme=eu-eaap'"
      expected_outcome: "Wallet accepts the eu-eaap:// invocation scheme for the deployed presentation flow."
